<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CISSP Flashcards</title>
<style>
  :root {
    --bg: #0f1115;
    --panel: #1a1e26;
    --panel2: #222834;
    --border: #2c3340;
    --text: #e7ecf3;
    --muted: #9aa6b5;
    --accent: #4f9dff;
    --good: #34c77b;
    --bad: #ff6b6b;
    --shadow: 0 10px 30px rgba(0,0,0,0.45);
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: radial-gradient(1200px 600px at 50% -10%, #182030 0%, var(--bg) 60%);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }
  header {
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
    justify-content: space-between;
    background: rgba(15,17,21,0.7);
    backdrop-filter: blur(6px);
  }
  h1 { font-size: 18px; margin: 0; letter-spacing: 0.3px; }
  h1 span { color: var(--accent); }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
  select, button {
    font: inherit;
    color: var(--text);
    background: var(--panel2);
    border: 1px solid var(--border);
    border-radius: 9px;
    padding: 8px 12px;
    cursor: pointer;
    transition: background .15s, border-color .15s, transform .05s;
  }
  select { cursor: pointer; }
  button:hover, select:hover { border-color: var(--accent); }
  button:active { transform: translateY(1px); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #07101e; font-weight: 600; }
  button.good { background: var(--good); border-color: var(--good); color: #062014; font-weight: 600; }
  button.bad { background: var(--bad); border-color: var(--bad); color: #2a0606; font-weight: 600; }
  label.lbl { font-size: 12px; color: var(--muted); margin-right: 4px; }

  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 18px 8px;
    gap: 16px;
    width: 100%;
  }

  .stats {
    display: flex;
    flex-wrap: wrap;
    gap: 10px 18px;
    font-size: 13px;
    color: var(--muted);
    justify-content: center;
  }
  .stats b { color: var(--text); }
  .pill { background: var(--panel); border: 1px solid var(--border); padding: 4px 10px; border-radius: 20px; }
  .pill.good b { color: var(--good); }
  .pill.bad b { color: var(--bad); }

  .card-wrap { width: min(760px, 96vw); perspective: 1600px; }
  .card {
    position: relative;
    width: 100%;
    min-height: 320px;
    cursor: pointer;
    transform-style: preserve-3d;
    transition: transform 0.5s cubic-bezier(.2,.7,.2,1);
  }
  .card.flipped { transform: rotateY(180deg); }
  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    -webkit-backface-visibility: hidden;
    background: linear-gradient(180deg, var(--panel2), var(--panel));
    border: 1px solid var(--border);
    border-radius: 18px;
    box-shadow: var(--shadow);
    padding: 26px 28px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .face.back { transform: rotateY(180deg); }
  .meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 14px;
    flex: 0 0 auto;
  }
  .tag {
    font-size: 11px;
    letter-spacing: .4px;
    text-transform: uppercase;
    color: var(--muted);
    background: rgba(79,157,255,0.10);
    border: 1px solid var(--border);
    padding: 3px 9px;
    border-radius: 20px;
  }
  .tag.kind { color: var(--accent); }
  .content {
    flex: 1 1 auto;
    overflow-y: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .content .text {
    font-size: clamp(18px, 3.2vw, 26px);
    line-height: 1.45;
    font-weight: 500;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .face.back .content .text { font-size: clamp(16px, 2.7vw, 22px); font-weight: 450; text-align: left; }
  .hint { flex: 0 0 auto; text-align: center; color: var(--muted); font-size: 12px; margin-top: 12px; }

  .nav {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
    justify-content: center;
  }
  .grade { display: flex; gap: 10px; }
  .position { font-variant-numeric: tabular-nums; color: var(--muted); min-width: 90px; text-align: center; }

  .progress-bar {
    width: min(760px, 96vw);
    height: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
  }
  .progress-bar > div { height: 100%; background: var(--good); width: 0%; transition: width .3s; }

  footer {
    padding: 10px 18px 18px;
    text-align: center;
    color: var(--muted);
    font-size: 12px;
  }
  kbd {
    background: var(--panel2);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 5px;
    padding: 1px 6px;
    font-family: ui-monospace, Menlo, Consolas, monospace;
    font-size: 11px;
    color: var(--text);
  }
  .done {
    text-align: center;
    padding: 40px 20px;
  }
  .done h2 { color: var(--good); margin: 0 0 10px; }
  @media (max-width: 560px) {
    .position { min-width: 70px; }
    h1 { font-size: 16px; }
    .face { padding: 20px; }
  }
</style>
</head>
<body>
<header>
  <h1>CISSP <span>Flashcards</span></h1>
  <div class="controls">
    <span><label class="lbl">Domain</label>
      <select id="domainSel"></select></span>
    <span><label class="lbl">Deck</label>
      <select id="deckSel"></select></span>
    <button id="shuffleBtn" title="Shuffle (s)">🔀 Shuffle</button>
    <button id="missedBtn" title="Study only cards you've flagged 'Review' (m)">📕 Missed only</button>
    <button id="exportBtn" title="Export missed cards as a cram sheet (.md)">⬇ Export cram</button>
    <button id="resetBtn" title="Restart this deck (session)">↺ Reset</button>
    <button id="clearBtn" title="Clear ALL saved progress">🗑 Clear</button>
  </div>
</header>

<main>
  <div class="stats" id="stats"></div>
  <div class="progress-bar"><div id="progressFill"></div></div>

  <div class="card-wrap" id="cardWrap">
    <div class="card" id="card">
      <div class="face front">
        <div class="meta" id="frontMeta"></div>
        <div class="content"><div class="text" id="frontText"></div></div>
        <div class="hint">Click card or press <kbd>Space</kbd> to flip</div>
      </div>
      <div class="face back">
        <div class="meta" id="backMeta"></div>
        <div class="content"><div class="text" id="backText"></div></div>
        <div class="hint"><kbd>k</kbd> Got it &nbsp;·&nbsp; <kbd>j</kbd> Review again</div>
      </div>
    </div>
  </div>

  <div class="nav">
    <button id="prevBtn" title="Previous (←)">← Prev</button>
    <span class="position" id="position">0 / 0</span>
    <button id="nextBtn" title="Next (→)">Next →</button>
    <span class="grade">
      <button id="goodBtn" class="good" title="Got it (k)">✓ Got it</button>
      <button id="badBtn" class="bad" title="Review again (j)">✗ Review</button>
    </span>
  </div>
</main>

<footer>
  Shortcuts: <kbd>Space</kbd> flip · <kbd>←</kbd>/<kbd>→</kbd> nav ·
  <kbd>k</kbd> got it · <kbd>j</kbd> review · <kbd>s</kbd> shuffle · <kbd>m</kbd> missed-only
  &nbsp;|&nbsp; Progress saves automatically · "Export cram" downloads your missed cards
  &nbsp;|&nbsp; <span id="deckInfo"></span>
</footer>

"section": "Data Classification & Sanitization",
"question": "What does degaussing do, and what does it work on?",

"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "The two axes a control is classified on?",
"answer": "(1) TYPE/how implemented: Administrative (policy/people), Technical/Logical (tech), Physical. (2) FUNCTION/what it does: Deterrent, Preventive, Detective, Corrective, Recovery, Compensating, Directive."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Preventive control — mechanism?",
"answer": "STOPS an action before it happens (lock, firewall rule, encryption, separation of duties)."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Detective control — mechanism?",
"answer": "IDENTIFIES/records an event after/while it happens (logs, IDS, CCTV review, audit)."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Corrective control — mechanism?",
"answer": "FIXES/returns to normal in place after an incident (patch, antivirus removing malware, IPS blocking the source). Full restore from backup = RECOVERY, not corrective."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Recovery control — mechanism vs corrective?",
"answer": "Restores capability after a MAJOR event (DR site, backups, rebuild). Corrective = minor fix in place; recovery = larger-scale restoration."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Deterrent control — mechanism?",
"answer": "DISCOURAGES a would-be actor (warning banner, \"guard dog\" sign, visible camera). Works on the mind, not the action."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Compensating control — mechanism?",
"answer": "An ALTERNATIVE that provides similar protection when the primary control isn't feasible (e.g., can't patch → segment the host instead)."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Directive control — mechanism?",
"answer": "DIRECTS/mandates behavior (policy, procedure, signage telling people what to do)."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "A camera can be which functions, depending on framing?",
"answer": "Deterrent (if visible, discourages) AND Detective (records for later). Same control, different function by use — read the stem."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "If a question asks the FUNCTION of a control commonly labeled \"physical,\" what do you answer?",
"answer": "The function, not the type. Type and function are different axes — answer the one asked. A fence is physical by TYPE but preventive/deterrent by FUNCTION."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Asset / Threat / Vulnerability / Risk — mechanism of each?",
"answer": "Asset = thing of value. Threat = potential harmful event/actor. Vulnerability = weakness. Risk = likelihood × impact that a threat exploits a vulnerability. Risk needs BOTH a threat AND a vulnerability."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Threat vs Threat agent/actor?",
"answer": "Threat = the potential event (flood, malware). Threat agent/actor = the entity that carries it out (hacker, nature)."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Exposure vs Risk?",
"answer": "Exposure = an instance of being susceptible to loss. Risk = the probability+impact of that loss occurring."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Safeguard vs Countermeasure?",
"answer": "Safeguard = PROACTIVE control (reduce risk before). Countermeasure = REACTIVE control (respond after a specific threat). Both are controls; timing differs."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Total / Inherent / Residual risk — how many real states?",
"answer": "TWO. Total risk = Inherent risk = the SAME thing = risk BEFORE/without any controls. Residual risk = what's LEFT after controls (what you accept). Don't separate \"total\" from \"inherent\" — they're synonyms for \"before controls.\""
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Formula linking total and residual risk?",
"answer": "Total (Inherent) risk − Controls gap = Residual risk. The controls gap = the amount of risk the safeguards removed."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Control gap — mechanism?",
"answer": "The difference between total/inherent risk and residual risk — i.e., the amount of risk a control actually removes."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "SLE / EF / ARO / ALE — formulas?",
"answer": "SLE = AV × EF. ARO = times per year. ALE = SLE × ARO. EF = % of asset lost per incident. (n(n-1)/2 is the SYMMETRIC KEY formula, don't confuse.)"
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Qualitative vs Quantitative risk analysis — mechanism?",
"answer": "Quantitative = hard numbers/money ($ALE). Qualitative = relative ratings (high/med/low, scenarios). Most real programs are hybrid."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Risk responses — the five?",
"answer": "Mitigate/Reduce (add control), Transfer (insurance/outsource), Avoid (stop the activity), Accept (do nothing, document), Deter (discourage). You can never reach zero risk."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Due care vs Due diligence — mechanism?",
"answer": "Due diligence = the ongoing investigation/research to KNOW (gather info, assess). Due care = DOING the reasonable actions (acting on it, implementing controls). Diligence = think/plan; Care = act. \"A prudent person.\""
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Policy / Standard / Baseline / Procedure / Guideline — mechanism + mandatory?",
"answer": "Policy = high-level mandatory intent. Standard = mandatory specific requirement (must use AES-256). Baseline = mandatory minimum level. Procedure = mandatory step-by-step. Guideline = OPTIONAL recommendation. Only guideline is non-mandatory."
},
{
"domain": "Domain 1",
"domainNum": "1",
"deck": "Glossary",
"section": "Domain 1 — Security & Risk Management (recall terms)",
"question": "Data Controller vs Processor (GDPR)?",
"answer": "Controller = decides WHY/HOW data is processed (the company). Processor = processes ON BEHALF of controller, per instructions (the vendor). Data Subject = the person the data is about."
},
{
"domain": "Domain 2",
"domainNum": "2",
"deck": "Glossary",
"section": "Domain 2 — Asset Security (recall terms)",
"question": "Data Owner vs Custodian vs Steward?",
"answer": "Owner = accountable, sets classification (senior/business). Custodian = implements/maintains protection day-to-day (IT). Steward = ensures data quality/business meaning. Owner decides, custodian does."
},
{

"domainNum": "2",
"deck": "Glossary",
"section": "Domain 2 — Asset Security (recall terms)",
"question": "Clearing vs Purging vs Destruction?",
"answer": "Clearing = overwrite, defeats normal recovery, media REUSED in same environment. Purging = stronger (degauss/secure-erase), defeats lab recovery, media leaves environment. Destruction = physically destroy, media gone. Escalating assurance."
},
{

"domainNum": "2",
"deck": "Glossary",
"section": "Domain 2 — Asset Security (recall terms)",
"question": "Degaussing — what does and doesn't it work on?",

{

"domainNum": "2",
"deck": "Glossary",
"section": "Domain 2 — Asset Security (recall terms)",
"question": "Tokenization / Masking / Anonymization / Pseudonymization?",

{

"domainNum": "2",
"deck": "Glossary",
"section": "Domain 2 — Asset Security (recall terms)",
"question": "Steganography vs Watermarking vs DLP vs DRM?",

{

"domainNum": "2",
"deck": "Glossary",
"section": "Domain 2 — Asset Security (recall terms)",
"question": "Primary GOAL of asset management?",

},
{

"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "What is CXL?",

},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "Symmetric vs Asymmetric — mechanism + key math?",
"answer": "Symmetric = one shared secret key, fast, bulk data; keys needed = n(n-1)/2. Asymmetric = public/private key pair, slow, key exchange + signatures; keys = 2n. Real systems use asymmetric to exchange a symmetric key (hybrid)."
},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "Confusion vs Diffusion?",
"answer": "Confusion = relationship between key and ciphertext is complex (substitution). Diffusion = one plaintext bit changes many ciphertext bits (transposition/spreading). Confusion hides the key; diffusion spreads the plaintext."
},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "Substitution vs Transposition?",
"answer": "Substitution = REPLACE symbols (Caesar). Transposition = REORDER symbols (rearrange). Modern ciphers use both."
},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "Hashing vs Encryption vs Encoding?",
"answer": "Hashing = one-way, fixed-length, integrity (can't reverse). Encryption = reversible WITH a key, confidentiality. Encoding = reversible WITHOUT a key, just format (Base64) — NOT security."
},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "Digital signature — mechanism + what it provides?",
"answer": "Hash the message, encrypt the hash with SENDER'S PRIVATE key. Verify with sender's PUBLIC key. Provides integrity + authentication + non-repudiation (NOT confidentiality)."
},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "Non-repudiation — mechanism?",
"answer": "Can't deny you did it — provided by digital signatures (private key only you hold). Symmetric/shared keys CAN'T give non-repudiation (others have the key)."
},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "Salt — mechanism?",
"answer": "Random value added before hashing so identical inputs hash differently — defeats rainbow tables/precomputation. (Nonce/IV = randomness for encryption uniqueness.)"
},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "Which modes give confidentiality AND authenticity (AEAD)?",
"answer": "GCM and CCM. ECB/CBC/CTR/OFB = confidentiality only. If a question wants integrity+confidentiality in one mode → GCM/CCM."
},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "ECB weakness vs CBC error propagation?",
"answer": "ECB = identical plaintext blocks → identical ciphertext (patterns leak), no chaining. CBC chains blocks, so a bit error PROPAGATES to the next block. CTR/OFB = stream-like, errors don't propagate."
},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "Secure vs legacy symmetric ciphers (exam tactic)?",
"answer": "Secure/modern: AES, Twofish, Serpent, Blowfish, CAST-256/CAST-128, RC6, IDEA. Legacy/weak (discontinue): DES, 3DES, RC4, SKIPJACK(80-bit). \"Most secure\" → pick the AES-family/finalist; \"discontinue\" → the old/short-key one."
},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "AES facts (key sizes + max)?",
"answer": "AES key sizes = 128/192/256 bits; MAX is 256 (there is NO 512). Block size = 128 bits always. One-time pad = the only THEORETICALLY unbreakable cipher (not AES)."
},
{
"domain": "Domain 3",
"domainNum": "3",
"deck": "Glossary",
"section": "Domain 3 — Security Architecture & Engineering (recall terms)",
"question": "Covert channel — storage vs timing?",

},
{

{

"section": "Domain 4 — Communication & Network Security (recall terms)",

{

"section": "Domain 4 — Communication & Network Security (recall terms)",
"question": "Store-and-forward vs cut-through switching?",

{

{

{

"section": "Domain 5 — Identity & Access Management (recall terms)",

"section": "Domain 7 — Security Operations (recall terms)",

{

{

// ---------- persistent progress (localStorage) ----------
const LS_KEY = "cissp_fc_progress_v1";
function loadProgress(){ try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch(e){ return {}; } }
function saveProgress(){ try { localStorage.setItem(LS_KEY, JSON.stringify(PROGRESS)); } catch(e){} }
let PROGRESS = loadProgress();
function cardKey(c){ return c.question; }                 // stable across regenerations
function cardStatus(c){ const r = PROGRESS[cardKey(c)]; return r ? r.s : null; } // 'k' | 'u' | null
function cardMiss(c){ const r = PROGRESS[cardKey(c)]; return r ? (r.m||0) : 0; }
function markCard(c, known){
  const k = cardKey(c);
  const r = PROGRESS[k] || {s:null, m:0, h:0};
  if(known){ r.s='k'; r.h=(r.h||0)+1; } else { r.s='u'; r.m=(r.m||0)+1; }
  PROGRESS[k]=r; saveProgress();
}
function persistStats(deck){
  let k=0,u=0,n=0;
  deck.forEach(c=>{ const s=cardStatus(c); if(s==='k')k++; else if(s==='u')u++; else n++; });
  return {k,u,n};
}

// ---------- helpers ----------
function esc(s){
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}
function shuffleArr(a){
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function uniqueDomains(){
  // unique by domainNum, sorted 1..8 then Cross-domain last
  const map = {};
  CARDS.forEach(c=>{ map[c.domainNum]= c.domain; });
  const keys = Object.keys(map);
  keys.sort((a,b)=>{
    const na = (a==="X") ? 99 : parseInt(a);
    const nb = (b==="X") ? 99 : parseInt(b);
    return na-nb;
  });
  return keys.map(k=>({num:k, label:map[k]}));
}
function decksFor(domainNum){
  const seen=[];
  CARDS.forEach(c=>{
    if(domainNum==="All" || c.domainNum===domainNum){
      if(c.deck && !seen.includes(c.deck)) seen.push(c.deck);
    }
  });
  // stable order
  const order = ["Concepts","Terms","Drill","Glossary","Other"];
  seen.sort((a,b)=> order.indexOf(a)-order.indexOf(b));
  return seen;
}

function fillDomainSel(){
  domainSel.innerHTML="";
  const optAll=document.createElement("option");
  optAll.value="All"; optAll.textContent="All domains";
  domainSel.appendChild(optAll);
  uniqueDomains().forEach(d=>{
    const o=document.createElement("option");
    o.value=d.num; o.textContent=d.label;
    domainSel.appendChild(o);
  });
}
function fillDeckSel(){
  deckSel.innerHTML="";
  const optAll=document.createElement("option");
  optAll.value="All"; optAll.textContent="All decks";
  deckSel.appendChild(optAll);
  decksFor(state.domain).forEach(s=>{
    const o=document.createElement("option");
    o.value=s; o.textContent=s;
    deckSel.appendChild(o);
  });
}

// ---------- deck building ----------
function scopeDeck(){ // domain/deck filter only (ignores missedOnly) — for stats
  return CARDS.filter(c=>{
    if(state.domain!=="All" && c.domainNum!==state.domain) return false;
    if(state.deck!=="All" && c.deck!==state.deck) return false;
    return true;
  });
}
function baseDeck(){
  return scopeDeck().filter(c=>{
    if(state.missedOnly && cardStatus(c)!=='u') return false;
    return true;
  });
}
function rebuildDeck(){
  let deck = baseDeck().slice();
  if(state.shuffled) shuffleArr(deck);
  state.queue = deck;
  state.total = deck.length;
  state.pos = 0;
  state.flipped = false;
  state.got = 0;
  state.reviewed = 0;
  state.reviewQueued = 0;
  render();
}

// ---------- rendering ----------
function render(){
  const q = state.queue;
  const done = state.pos >= q.length;
  const card = done ? null : q[state.pos];

  cardEl.classList.toggle("flipped", state.flipped && !done);

  const frontMeta = document.getElementById("frontMeta");
  const backMeta  = document.getElementById("backMeta");
  const frontText = document.getElementById("frontText");
  const backText  = document.getElementById("backText");

  if(done){
    frontMeta.innerHTML="";
    backMeta.innerHTML="";
    frontText.innerHTML = q.length===0
      ? "<span style='color:var(--muted)'>No cards match this filter.</span>"
      : "<div class='done'><h2>✓ Deck complete!</h2>"
        + "<div style='color:var(--muted)'>Got it: <b style='color:var(--good)'>"+state.got+"</b>"
        + " &nbsp;·&nbsp; Review presses: <b style='color:var(--bad)'>"+state.reviewed+"</b></div>"
        + "<div style='margin-top:14px;color:var(--muted)'>Press Reset to study again.</div></div>";
    backText.innerHTML="";
  } else {
    const tags = "<span class='tag kind'>"+esc(card.domain)+"</span>"
               + "<span class='tag'>"+esc(card.deck)+"</span>"
               + (card.section ? "<span class='tag'>"+esc(card.section)+"</span>" : "");
    frontMeta.innerHTML = tags + "<span class='tag'>Question</span>";
    backMeta.innerHTML  = tags + "<span class='tag'>Answer</span>";
    frontText.innerHTML = esc(card.question);
    backText.innerHTML  = esc(card.answer);
  }

  const posLabel = q.length===0 ? "0 / 0"
    : (Math.min(state.pos+1, q.length)) + " / " + q.length;
  document.getElementById("position").textContent = posLabel;

  const remaining = Math.max(q.length - state.pos, 0);
  const ps = persistStats(scopeDeck());
  document.getElementById("stats").innerHTML =
      "<span class='pill'>Remaining <b>"+remaining+"</b></span>"
    + "<span class='pill good'>Got it <b>"+state.got+"</b></span>"
    + "<span class='pill bad'>Re-queued <b>"+state.reviewQueued+"</b></span>"
    + "<span class='pill'>Deck size <b>"+state.total+"</b></span>"
    + "<span class='pill'>Saved: known <b style='color:var(--good)'>"+ps.k+"</b> · flagged <b style='color:var(--bad)'>"+ps.u+"</b> · unseen <b>"+ps.n+"</b></span>";

  const pct = q.length===0 ? 0 : Math.round((state.pos / q.length) * 100);
  document.getElementById("progressFill").style.width = pct + "%";

  const canGrade = !done && state.flipped;
  document.getElementById("goodBtn").disabled = !canGrade;
  document.getElementById("badBtn").disabled  = !canGrade;
  document.getElementById("goodBtn").style.opacity = canGrade ? 1 : .45;
  document.getElementById("badBtn").style.opacity  = canGrade ? 1 : .45;

  document.getElementById("deckInfo").textContent =
    "Total cards loaded: " + CARDS.length;
}

// ---------- actions ----------
function flip(){
  if(state.pos >= state.queue.length) return;
  state.flipped = !state.flipped;
  render();
}
function next(){
  if(state.pos < state.queue.length){ state.pos++; state.flipped=false; render(); }
}
function prev(){
  if(state.pos > 0){ state.pos--; state.flipped=false; render(); }
}
function gradeGood(){
  if(state.pos >= state.queue.length || !state.flipped) return;
  markCard(state.queue[state.pos], true);
  state.got++;
  state.pos++;
  state.flipped=false;
  render();
}
function gradeBad(){
  if(state.pos >= state.queue.length || !state.flipped) return;
  state.reviewed++;
  const card = state.queue[state.pos];
  markCard(card, false);
  state.queue.push(card);
  state.reviewQueued++;
  state.pos++;
  state.flipped=false;
  render();
}

// ---------- missed-only / export / clear ----------
function toggleMissed(){
  state.missedOnly = !state.missedOnly;
  const btn = document.getElementById("missedBtn");
  btn.classList.toggle("primary", state.missedOnly);
  btn.textContent = state.missedOnly ? "📕 Missed only ✓" : "📕 Missed only";
  rebuildDeck();
}
function exportMissed(){
  const missed = CARDS.filter(c=>cardStatus(c)==='u');
  if(missed.length===0){ alert("No cards flagged 'Review' yet — study some first, hitting ✗ Review on ones you don't know."); return; }
  missed.sort((a,b)=>{
    const na=(a.domainNum==="X")?99:parseInt(a.domainNum);
    const nb=(b.domainNum==="X")?99:parseInt(b.domainNum);
    if(na!==nb) return na-nb;
    return cardMiss(b)-cardMiss(a);
  });
  let md = "# My Cram Sheet — Missed Cards ("+missed.length+")\n\n";
  md += "> Auto-generated from the flashcard app: the cards you flagged 'Review'. Sorted by domain, then most-missed first.\n\n";
  let curDom="";
  missed.forEach(c=>{
    if(c.domain!==curDom){ curDom=c.domain; md += "\n## "+curDom+"\n\n"; }
    md += "- **"+c.question+"** — "+c.answer+"  _(missed "+cardMiss(c)+"x)_\n";
  });
  const blob = new Blob([md], {type:"text/markdown"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "my-cram-sheet.md";
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
}
function clearProgress(){
  if(!confirm("Clear ALL saved progress (known/flagged status for every card)? This cannot be undone.")) return;
  PROGRESS = {}; saveProgress();
  state.missedOnly = false;
  const btn = document.getElementById("missedBtn");
  btn.classList.remove("primary"); btn.textContent = "📕 Missed only";
  rebuildDeck();
}

// ---------- events ----------
cardEl.addEventListener("click", flip);
document.getElementById("nextBtn").addEventListener("click", next);
document.getElementById("prevBtn").addEventListener("click", prev);
document.getElementById("goodBtn").addEventListener("click", gradeGood);
document.getElementById("badBtn").addEventListener("click", gradeBad);
document.getElementById("resetBtn").addEventListener("click", rebuildDeck);
document.getElementById("missedBtn").addEventListener("click", toggleMissed);
document.getElementById("exportBtn").addEventListener("click", exportMissed);
document.getElementById("clearBtn").addEventListener("click", clearProgress);
document.getElementById("shuffleBtn").addEventListener("click", ()=>{
  state.shuffled = true;
  rebuildDeck();
});
domainSel.addEventListener("change", ()=>{
  state.domain = domainSel.value;
  state.deck = "All";
  fillDeckSel();
  rebuildDeck();
});
deckSel.addEventListener("change", ()=>{
  state.deck = deckSel.value;
  rebuildDeck();
});

document.addEventListener("keydown", (e)=>{
  if(e.target.tagName==="SELECT") return;
  switch(e.key){
    case " ": case "Enter": e.preventDefault(); flip(); break;
    case "ArrowRight": e.preventDefault(); next(); break;
    case "ArrowLeft": e.preventDefault(); prev(); break;
    case "k": case "K": gradeGood(); break;
    case "j": case "J": gradeBad(); break;
    case "s": case "S": state.shuffled=true; rebuildDeck(); break;
    case "m": case "M": toggleMissed(); break;
  }
});

// ---------- init ----------
fillDomainSel();
fillDeckSel();
rebuildDeck();
</script>
</body>
</html>
